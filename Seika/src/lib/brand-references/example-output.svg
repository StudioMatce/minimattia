<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6" fill="none" stroke="#1C2D28" stroke-width="1.2"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00A67D" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#00A67D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00A67D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#EBEEE4"/>

  <!-- Decorative dashed circles (background texture) -->
  <circle cx="120" cy="90" r="45" fill="none" stroke="#1C2D28" stroke-width="0.6" stroke-dasharray="4 4" opacity="0.25"/>
  <circle cx="780" cy="520" r="35" fill="none" stroke="#1C2D28" stroke-width="0.6" stroke-dasharray="4 4" opacity="0.25"/>

  <!-- Connections FIRST (solid lines, drawn BELOW nodes) -->
  <!-- Node 1 → Node 2: right then down -->
  <path d="M 270 210 L 390 210 Q 400 210 400 220 L 400 300" fill="none" stroke="#1C2D28" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Node 2 → Node 3: right, straight horizontal -->
  <path d="M 510 340 L 690 340" fill="none" stroke="#1C2D28" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Node 1 → Node 3: down then right -->
  <path d="M 210 270 L 210 460 Q 210 470 220 470 L 740 470 Q 750 470 750 460 L 750 400" fill="none" stroke="#1C2D28" stroke-width="1.2"/>

  <!-- Nodes AFTER connections (solid fill covers crossing connections) -->

  <!-- Node 1: "Analisi dati" — dashed circle with solid fill -->
  <circle cx="210" cy="210" r="65" fill="#EBEEE4" stroke="#1C2D28" stroke-width="1.2" stroke-dasharray="8 5"/>
  <text x="210" y="200" text-anchor="middle" dominant-baseline="central" font-family="Aptos, sans-serif" font-size="14" font-weight="500" fill="#1C2D28">Analisi dati e</text>
  <text x="210" y="220" text-anchor="middle" dominant-baseline="central" font-family="Aptos, sans-serif" font-size="14" font-weight="500" fill="#1C2D28">reportistica</text>

  <!-- Node 2: "Intelligenza artificiale" — highlighted with glow -->
  <circle cx="450" cy="340" r="85" fill="url(#glow)"/>
  <circle cx="450" cy="340" r="60" fill="#EBEEE4" stroke="#00A67D" stroke-width="1.5"/>
  <text x="450" y="330" text-anchor="middle" dominant-baseline="central" font-family="Aptos, sans-serif" font-size="15" font-weight="600" fill="#00A67D">Intelligenza</text>
  <text x="450" y="352" text-anchor="middle" dominant-baseline="central" font-family="Aptos, sans-serif" font-size="15" font-weight="600" fill="#00A67D">artificiale</text>

  <!-- Node 3: "Ottimizzazione" — dashed circle with solid fill -->
  <circle cx="750" cy="340" r="60" fill="#EBEEE4" stroke="#1C2D28" stroke-width="1.2" stroke-dasharray="8 5"/>
  <text x="750" y="330" text-anchor="middle" dominant-baseline="central" font-family="Aptos, sans-serif" font-size="14" font-weight="500" fill="#1C2D28">Ottimizzazione</text>
  <text x="750" y="350" text-anchor="middle" dominant-baseline="central" font-family="Aptos, sans-serif" font-size="14" font-weight="500" fill="#1C2D28">processi</text>

  <!-- Dot markers -->
  <circle cx="340" cy="155" r="5.5" fill="#00A67D"/>
  <circle cx="630" cy="245" r="4" fill="#1C2D28"/>
  <circle cx="150" cy="400" r="4" fill="#1C2D28"/>
  <circle cx="680" cy="460" r="3.5" fill="#00A67D"/>
  <circle cx="810" cy="130" r="9" fill="none" stroke="#1C2D28" stroke-width="0.8" stroke-dasharray="3 3"/>
  <circle cx="350" cy="500" r="7" fill="none" stroke="#00A67D" stroke-width="0.8" stroke-dasharray="3 3"/>
</svg>
